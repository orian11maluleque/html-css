<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagens dinamicas</h1>
    <p>Tente abrir esse site em varios dispositivos diferentes, ou simplismente aumente ou diminua o tamanho do navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="img/img-pequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="img/img-medio.png" type="image/png">
        <img src="img/img-grande.png" alt="Imagem flexivel">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <audio src="midia/heysubnormales-original.mp3" autoplay controls></audio>

    <audio preload="metadata" autoplay controls loop>
        <source src="midia/heysubnormales-original.mp3" type="audio/mpeg">
        <source src="midia/heysubnormales-original.ogg" type="audio/ogg">
        <source src="midia/heysubnormales-original.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio <a href="midia/heysubnormales-original.mp3">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
</body>
</html>
