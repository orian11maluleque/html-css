<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hoover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Times New Roman', Times, serif;
        }
        div{
            height: 50PX;
            width: 200px;
            border: 1px solid black ;
            background-color: yellowgreen;
            text-align: center;
            margin: auto;
        }
        div > p{
            display: none;
        }
        div:hover{
            background-color: aquamarine;
            box-shadow: 1px 1px 2px black;
        }
        div:hover > p{
            display: block;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <h1>Exemplo de hoover</h1>
    <p>Passse o mause por cima do texto abaixoo</p>
    <div>
        Passe o mause por aqui
        <p>TEXTO ESCONDIDO</p>
    </div>
    <P>FIM DO EXEMPLO</P>
</body>
</html>
