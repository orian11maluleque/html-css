<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <style>
        div{
            background-color: grey;
            border: 1px;
            border-color: black;
            border-style: solid;
            height: 200px;
            width: 200px;
            display: inline-block;
            text-align: center;
        }

        div:hover{
            box-shadow: 2px 2px 10px rgb(0, 0, 0);
            background-color: brown;
        }


    </style>
</head>
<body>
    <div>01</div>
    <div>02</div>
    <div>03</div>
</body>
</html>
