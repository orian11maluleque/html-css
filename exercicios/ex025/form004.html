<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="inome">Nome Completo</label>
                <input type="text" name="nome" id="inome" autocomplete="name" minlength="4" maxlength="20 required">
            </p>
            <p>
                <label for="imail">Endereco eletronico:</label>
                <input type="email" name="mail" id="imail" autocomplete="email" required placeholder="SeuEmail@SeuEmail.com">
            </p>
            <p>
                <label for="itel">Numero de telefone:</label>
                <input type="tel" name="tel" id="itel" autocomplete="tel" required placeholder="81 123 4567" pattern="^[0-9]{10}$" size="10">
            </p>
        </fieldset>
        <p>
            <input type="reset" value="Limpar">
            <input type="submit" value="Enviar">
        </p>
    </form>
</body>
</html>
