<!DOCTYPE html>
<html lang="pt-be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Meu formulario</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="icor">Escolha a cor</label>
            <input type="color" name="cor" id="icor" value="#ffffff">
        </p>
        <p>
            <label for="irag">Nivel de Satisfacao</label>
            <input type="range" name="rag" id="irag" max="10" value="2" >
        </p>
        <p>
            <label for="ifoto">Escolha sua foto de perfil</label>
            <input type="file" name="foto" id="ifoto" required>
        </p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>

</body>
</html>
