<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de formulario com Output</h1>
    <form action="cadastro.php" method="get">
        <p>
            <label for="irag">Escala de satisfacao</label>
            <input type="range" name="rag" id="irag" min="0" max="10" oninput="ival.innerHTML = Number(irag.value)">
            <output id="ival">5</output>
        </p>

        <p>
            <input type="reset" value="Limpar">
            <input type="submit" value="Enviar">
        </p>
    </form>
</body>
</html>
