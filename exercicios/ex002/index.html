<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragráfos</title>
</head>
<body>
    <h1>Paragráfos e quebras de linhas</h1>
    <hr>
    <p>Você pode escrever um Paragráfo de qualquer 
        
        jeito. Basta que tudo esteja dentro das tag de Paragráfo. &lt;p&gt;
        <br>
        Se precisar quebrar o texto uso a tag de quebrar o texto.&lt;br&gt;
    </p>

    <p>Vamos adicionar simbolos especiais: <!--Para mais simbolos especiais ha varias listas na internet-->
        &cent;
        &reg;
        &delta;
        &Delta;
        &pound;
        &copy;
    </p>

    <p>Vamos colocar alguns emogis: <!--Para emogies so entrar na internet e copiar os codigos dos emogies-->
        &#x1F596;
        &#x1F913;
    </p>
    
</body>
</html>
